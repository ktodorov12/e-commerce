name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm first so setup-node's pnpm cache can resolve it. The pnpm version
      # comes from package.json → packageManager.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Thin: the real steps live in pipelines/ so CI and local match.
      - run: bash pipelines/ci.sh
